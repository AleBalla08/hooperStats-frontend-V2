<app-side-menu></app-side-menu>
<div class="ion-page" id="home-page">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title slot="start">
        Bem Vindo, User
      </ion-title>
      <ion-buttons slot="end">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
  <ion-content [fullscreen]="true">
    <div class="ion-padding">
      <ion-grid>
        <ion-row>
          <ion-col>
            <ion-card button routerLink="/treinos">
              <ion-card-header>
                <ion-card-title>
                  Treinos
                </ion-card-title>
                <ion-card-subtitle>
                  organize e gerencie seus treino por aqui
                </ion-card-subtitle>
              </ion-card-header>
              <ion-card-content class="card-content">
                <ion-icon name="barbell" size="large"></ion-icon>
              </ion-card-content>
            </ion-card>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-card button routerLink="/metas">
              <ion-card-header>
                <ion-card-title>
                  Metas
                </ion-card-title>
                <ion-card-subtitle>
                  organize e gerencie suas metas por aqui
                </ion-card-subtitle>
              </ion-card-header>
              <ion-card-content class="card-content">
                <ion-icon name="receipt" size="large"></ion-icon>
              </ion-card-content>
            </ion-card>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </ion-content>
</div>
